<style>
:root{--brand:#E05C1A;--brand-dark:#c44e14;--navy:#1C2340;--bg:#F0EDE8;--surface:#FFF;--surface2:#F7F5F2;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.15);--text:#1a1a1a;--muted:#6b6b6b;--green:#0F6E56;--green-bg:#E1F5EE;--green-text:#085041;--amber-bg:#FAEEDA;--amber-text:#633806;--blue-bg:#E6F1FB;--blue-text:#0C447C;--red:#A32D2D;--red-bg:#FCEBEB;--gray-bg:#F1EFE8;--gray-text:#444441;--shadow:0 2px 12px rgba(0,0,0,0.07);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.login-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:#fff;border-radius:16px;padding:40px 44px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-logo{width:56px;height:56px;background:var(--brand);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;margin:0 auto 20px}
.login-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px}
.login-sub{font-size:13px;color:#888;margin-bottom:24px}
.login-input{width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;margin-bottom:10px;text-align:center}
.login-input:focus{border-color:var(--brand)}
.login-btn{width:100%;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.login-btn:hover{background:var(--brand-dark)}
.login-error{color:#e02020;font-size:12px;margin-top:10px;display:none}
.topbar{background:var(--navy);padding:14px 32px;display:flex;align-items:center;gap:16px}
.topbar-label{color:rgba(255,255,255,0.6);font-size:12px;white-space:nowrap}
.topbar-input{flex:1;max-width:480px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:8px 14px;color:#fff;font-size:13px;font-family:'DM Mono',monospace;outline:none}
.topbar-btn{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;gap:0;overflow-x:auto}
.tab{padding:14px 22px;font-size:14px;font-weight:500;cursor:pointer;border-bottom:2.5px solid transparent;color:var(--muted);background:none;border-top:none;border-left:none;border-right:none;transition:all 0.15s;white-space:nowrap}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.tab:hover:not(.active){color:var(--text)}
.main{max-width:1100px;margin:0 auto;padding:28px 24px}
.panel{display:none}.panel.active{display:block}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.stat{background:var(--surface);border-radius:var(--radius);padding:20px 22px;border:1px solid var(--border)}
.stat-val{font-size:32px;font-weight:600;color:var(--brand);line-height:1;margin-bottom:6px}
.stat-val.dark{color:var(--text)}
.stat-label{font-size:13px;color:var(--muted)}
.stat-link{font-size:12px;color:var(--brand);cursor:pointer}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.client-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:18px 20px;cursor:pointer;transition:box-shadow 0.2s,transform 0.15s}
.client-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.card-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}

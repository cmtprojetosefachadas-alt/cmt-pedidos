<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CMT Projetos e Fachadas — Acompanhamento de Pedido</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cmt-dark:#0d1117;--cmt-navy:#131b2e;--cmt-orange:#e85d04;
  --cmt-orange2:#f48c06;--cmt-light:#f8f7f4;--cmt-white:#ffffff;
  --cmt-gray:#6b7280;--cmt-gray2:#9ca3af;--cmt-border:#e5e7eb;
  --cmt-border2:#d1d5db;--radius:10px;--radius-sm:7px;
}
body{font-family:'Barlow',sans-serif;background:var(--cmt-light);color:var(--cmt-dark);min-height:100vh;font-size:15px;}
.hidden{display:none!important}

/* LOGIN */
.login-page{min-height:100vh;display:flex;flex-direction:column;}
.login-hero{background:var(--cmt-navy);padding:3rem 2rem 2.5rem;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;overflow:hidden;}
.login-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;border-radius:50%;background:var(--cmt-orange);opacity:0.08;}
.login-hero::after{content:'';position:absolute;bottom:-80px;left:-40px;width:200px;height:200px;border-radius:50%;background:var(--cmt-orange2);opacity:0.06;}
.logo-mark{display:flex;align-items:center;gap:14px;margin-bottom:1.25rem;position:relative;z-index:1;}
.logo-box{width:56px;height:56px;background:var(--cmt-orange);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:#fff;letter-spacing:1px;flex-shrink:0;}
.logo-text{text-align:left;}
.logo-text h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:#fff;letter-spacing:0.5px;line-height:1.1;}
.logo-text span{font-size:12px;color:rgba(255,255,255,0.5);font-weight:400;letter-spacing:0.08em;text-transform:uppercase;}
.login-tagline{font-size:13px;color:rgba(255,255,255,0.45);position:relative;z-index:1;}
.login-body{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.25rem;}
.login-card{background:var(--cmt-white);border:1px solid var(--cmt-border);border-radius:var(--radius);padding:2rem 1.75rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.07);}
.login-card h2{font-size:17px;font-weight:700;margin-bottom:4px;}
.login-card p{font-size:13px;color:var(--cmt-gray);margin-bottom:1.75rem;}
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:12px;font-weight:600;color:var(--cmt-gray);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.05em;}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--cmt-border2);border-radius:var(--radius-sm);font-size:15px;font-family:'Barlow',sans-serif;background:var(--cmt-light);color:var(--cmt-dark);outline:none;transition:border-color 0.15s,background 0.15s;}
.field input:focus{border-color:var(--cmt-orange);background:var(--cmt-white);}
.btn-login{width:100%;padding:13px;border-radius:var(--radius-sm);border:none;background:var(--cmt-orange);color:#fff;font-family:'Barlow',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background 0.15s;letter-spacing:0.02em;margin-top:0.5rem;}
.btn-login:hover{background:#cf4d00}
.login-error{font-size:13px;color:#dc2626;text-align:center;margin-top:0.75rem;font-weight:500;}

/* HEADER */
.site-header{background:var(--cmt-navy);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.sh-left{display:flex;align-items:center;gap:12px}
.sh-logo{width:36px;height:36px;background:var(--cmt-orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:#fff;letter-spacing:1px;flex-shrink:0;}
.sh-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;color:#fff;letter-spacing:0.3px;}
.sh-divider{width:1px;height:20px;background:rgba(255,255,255,0.15);margin:0 4px;}
.sh-page{font-size:13px;color:rgba(255,255,255,0.5);font-weight:500;}
.sh-right{display:flex;align-items:center;gap:8px}
.sh-user{font-size:13px;color:rgba(255,255,255,0.7);font-weight:500;padding:4px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:20px;}
.btn-sair{font-size:13px;padding:6px 14px;border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius-sm);background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.15s;font-weight:500;}
.btn-sair:hover{background:rgba(255,255,255,0.1);color:#fff;}

/* ADMIN */
.admin-main{max-width:860px;margin:0 auto;padding:2rem 1.25rem;}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--cmt-border);margin-bottom:2rem;}
.tab-btn{padding:10px 20px;font-size:14px;font-weight:600;border:none;background:transparent;cursor:pointer;color:var(--cmt-gray);font-family:'Barlow',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color 0.15s;letter-spacing:0.01em;}
.tab-btn.active{color:var(--cmt-orange);border-bottom-color:var(--cmt-orange)}
.tab-btn:hover:not(.active){color:var(--cmt-dark)}

/* FORM */
.form-section{background:var(--cmt-white);border:1px solid var(--cmt-border);border-radius:var(--radius);padding:1.75rem;}
.form-section-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;margin-bottom:1.5rem;color:var(--cmt-dark);letter-spacing:0.3px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row.solo{grid-template-columns:1fr}
.f-group label{display:block;font-size:12px;font-weight:600;color:var(--cmt-gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
.f-group input,.f-group textarea{width:100%;padding:10px 13px;border:1.5px solid var(--cmt-border2);border-radius:var(--radius-sm);font-size:14px;font-family:'Barlow',sans-serif;background:var(--cmt-light);color:var(--cmt-dark);outline:none;transition:border-color 0.15s;}
.f-group input:focus,.f-group textarea:focus{border-color:var(--cmt-orange);background:#fff}
.form-hint{font-size:12px;color:var(--cmt-gray2);margin-bottom:1.25rem;padding:10px 14px;background:#fffbf5;border-left:3px solid var(--cmt-orange);border-radius:0 var(--radius-sm) var(--radius-sm) 0;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:8px;border-top:1px solid var(--cmt-border);margin-top:1.25rem;}
.btn-primary{padding:10px 26px;border-radius:var(--radius-sm);border:none;background:var(--cmt-orange);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;transition:background 0.15s;letter-spacing:0.02em;}
.btn-primary:hover{background:#cf4d00}
.btn-ghost{padding:10px 22px;border-radius:var(--radius-sm);border:1.5px solid var(--cmt-border2);background:transparent;color:var(--cmt-dark);font-size:14px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:background 0.15s;}
.btn-ghost:hover{background:var(--cmt-light)}

/* LINK CONFIG */
.link-config{background:var(--cmt-navy);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.75rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.link-config label{font-size:12px;font-weight:700;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;}
.link-config input{flex:1;min-width:200px;padding:8px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius-sm);font-size:13px;font-family:'Barlow',sans-serif;background:rgba(255,255,255,0.08);color:#fff;outline:none;}
.link-config input::placeholder{color:rgba(255,255,255,0.3)}
.link-config input:focus{border-color:var(--cmt-orange);}
.btn-link-salvar{padding:8px 16px;border-radius:var(--radius-sm);border:none;background:var(--cmt-orange);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;white-space:nowrap;}

.stat-card.clickable{cursor:pointer;transition:all 0.15s;}
.stat-card.clickable:hover{border-color:var(--cmt-orange);box-shadow:0 4px 16px rgba(232,93,4,0.1);transform:translateY(-1px);}
.stat-card.clickable:hover .stat-label{color:var(--cmt-orange);}

/* FOTO POR ETAPA */
.pc-foto{padding:0 1.5rem 1rem;border-bottom:1px solid var(--cmt-border);}
.pc-foto-label{font-size:11px;font-weight:700;color:var(--cmt-gray);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
.pc-foto-area{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pc-foto-preview{width:64px;height:64px;border-radius:8px;object-fit:cover;border:2px solid var(--cmt-border2);cursor:pointer;}
.btn-foto-upload{padding:7px 14px;border-radius:var(--radius-sm);border:1.5px dashed var(--cmt-border2);background:var(--cmt-light);color:var(--cmt-gray);font-size:12px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.15s;white-space:nowrap;}
.btn-foto-upload:hover{border-color:var(--cmt-orange);color:var(--cmt-orange);}
.btn-foto-remover{padding:5px 10px;border-radius:var(--radius-sm);border:1px solid #fca5a5;background:#fff5f5;color:#dc2626;font-size:11px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;}
.foto-input-hidden{display:none;}
.cl-foto{margin:0 1.75rem 1.5rem;}
.cl-foto-titulo{font-size:12px;font-weight:700;color:var(--cmt-gray);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
.cl-foto-img{width:100%;max-height:280px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--cmt-border);cursor:pointer;}

/* PÓS-VENDA */
.pv-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;justify-content:center;z-index:999;padding:0;animation:fadeIn 0.15s ease;}
@media(min-width:600px){.pv-overlay{align-items:center;padding:1rem;}}
.pv-box{background:var(--cmt-white);width:100%;max-width:540px;border-radius:var(--radius) var(--radius) 0 0;max-height:90vh;display:flex;flex-direction:column;animation:slideUp 0.25s ease;overflow:hidden;}
@media(min-width:600px){.pv-box{border-radius:var(--radius);}}
.pv-header{background:var(--cmt-navy);padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.pv-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:#fff;}
.pv-sub{font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;}
.pv-close{background:none;border:none;color:rgba(255,255,255,0.7);font-size:22px;cursor:pointer;line-height:1;padding:4px;}
.pv-msgs{flex:1;overflow-y:auto;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:10px;}
.pv-vazio{text-align:center;color:var(--cmt-gray2);font-size:13px;padding:2rem 0;}
.pv-msg{background:var(--cmt-light);border:1px solid var(--cmt-border);border-radius:var(--radius-sm);padding:10px 14px;}
.pv-msg-texto{font-size:13px;color:var(--cmt-dark);line-height:1.6;white-space:pre-wrap;}
.pv-msg-meta{font-size:11px;color:var(--cmt-gray2);margin-top:5px;display:flex;align-items:center;justify-content:space-between;}
.pv-msg-del{background:none;border:none;color:#dc2626;font-size:11px;cursor:pointer;font-weight:600;padding:0;}
.pv-input-area{padding:1rem 1.5rem;border-top:1px solid var(--cmt-border);flex-shrink:0;background:#fafaf8;}
.pv-textarea{width:100%;padding:10px 13px;border:1.5px solid var(--cmt-border2);border-radius:var(--radius-sm);font-size:13px;font-family:'Barlow',sans-serif;background:var(--cmt-white);color:var(--cmt-dark);outline:none;resize:none;transition:border-color 0.15s;}
.pv-textarea:focus{border-color:var(--cmt-orange);}
.pv-actions{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;}
.pv-wpp-check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--cmt-gray);flex:1;}
.pv-wpp-check input{accent-color:var(--cmt-orange);}
.btn-pv-enviar{padding:9px 20px;border-radius:var(--radius-sm);border:none;background:var(--cmt-orange);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;white-space:nowrap;}
.btn-pv-enviar:hover{background:#cf4d00}
.btn-posv{padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid #7c3aed;background:#faf5ff;color:#7c3aed;font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.15s;white-space:nowrap;}
.btn-posv:hover{background:#ede9fe;}
.btn-posv.tem-msgs{background:#7c3aed;color:#fff;}
.btn-posv.tem-msgs:hover{background:#6d28d9;}
.cl-posv{margin:0 1.75rem 1.5rem;}
.cl-posv-titulo{font-size:12px;font-weight:700;color:#7c3aed;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;}
.cl-posv-msg{background:#faf5ff;border:1px solid #ddd6fe;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px;}
.cl-posv-msg-texto{font-size:13px;color:var(--cmt-dark);line-height:1.6;white-space:pre-wrap;}
.cl-posv-msg-data{font-size:11px;color:#7c3aed;margin-top:4px;opacity:0.7;}
.foto-zoom-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;z-index:1000;cursor:pointer;}
.foto-zoom-img{max-width:95vw;max-height:90vh;border-radius:var(--radius-sm);}

/* ABA FINALIZADOS */
.fin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px;}
.fin-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;}
.btn-voltar{padding:8px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--cmt-border2);background:transparent;color:var(--cmt-gray);font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.15s;}
.btn-voltar:hover{border-color:var(--cmt-navy);color:var(--cmt-navy);}
.fin-lista{display:flex;flex-direction:column;gap:10px;}
.fin-item{background:var(--cmt-white);border:1px solid var(--cmt-border);border-radius:var(--radius);padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;transition:all 0.15s;flex-wrap:wrap;}
.fin-item:hover{border-color:var(--cmt-orange);box-shadow:0 3px 12px rgba(232,93,4,0.08);}
.fin-item-left{display:flex;align-items:center;gap:14px;}
.fin-avatar{width:40px;height:40px;border-radius:50%;background:#d1fae5;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:#065f46;flex-shrink:0;}
.fin-nome{font-size:14px;font-weight:700;color:var(--cmt-dark);}
.fin-sub{font-size:12px;color:var(--cmt-gray);margin-top:2px;}
.fin-data{font-size:12px;color:var(--cmt-gray2);text-align:right;white-space:nowrap;}
.fin-acoes{display:flex;gap:8px;align-items:center;}
.btn-pdf{padding:7px 14px;border-radius:var(--radius-sm);border:none;background:var(--cmt-orange);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;display:flex;align-items:center;gap:5px;transition:background 0.15s;white-space:nowrap;}
.btn-pdf:hover{background:#cf4d00}

/* MODAL PDF PREVIEW */
.modal-pdf-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem;animation:fadeIn 0.15s ease;}
.modal-pdf-box{background:#fff;border-radius:var(--radius);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);animation:slideUp 0.2s ease;}
.modal-pdf-actions{display:flex;gap:10px;justify-content:flex-end;padding:1rem 1.5rem;border-top:1px solid var(--cmt-border);background:#fafaf8;border-radius:0 0 var(--radius) var(--radius);}
.pdf-content{padding:2rem;}
.pdf-topo{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:2px solid #131b2e;}
.pdf-logo{display:flex;align-items:center;gap:10px;}
.pdf-logo-box{width:42px;height:42px;background:#e85d04;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:#fff;}
.pdf-empresa{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#131b2e;}
.pdf-subtitulo{font-size:11px;color:#6b7280;}
.pdf-num{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:#e85d04;}
.pdf-secao{margin-bottom:1.25rem;}
.pdf-secao-titulo{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #e5e7eb;}
.pdf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pdf-campo{font-size:13px;color:#0d1117;padding:6px 0;}
.pdf-campo span{display:block;font-size:11px;color:#9ca3af;margin-bottom:2px;}
.pdf-campo strong{font-weight:600;}
.pdf-etapas{display:flex;flex-direction:column;gap:6px;}
.pdf-etapa{display:flex;align-items:center;gap:10px;font-size:13px;padding:6px 10px;border-radius:6px;background:#f8f7f4;}
.pdf-etapa.ok{background:#d1fae5;color:#065f46;}
.pdf-etapa-num{width:20px;height:20px;border-radius:50%;background:#e85d04;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pdf-etapa.ok .pdf-etapa-num{background:#059669;}
.pdf-etapa-nome{flex:1;font-weight:500;}
.pdf-etapa-ts{font-size:11px;color:#6b7280;margin-left:auto;}
.pdf-rodape{margin-top:1.5rem;padding-top:1rem;border-top:1px solid #e5e7eb;font-size:11px;color:#9ca3af;text-align:center;}

/* ABA CLIENTES */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.75rem;}
.stat-card{background:var(--cmt-white);border:1px solid var(--cmt-border);border-radius:var(--radius);padding:1.1rem 1.25rem;}
.stat-card .stat-num{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;color:var(--cmt-dark);line-height:1;}
.stat-card .stat-label{font-size:12px;color:var(--cmt-gray);margin-top:4px;font-weight:500;}
.stat-card.highlight .stat-num{color:var(--cmt-orange);}
.clientes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.cliente-mini{background:var(--cmt-white);border:1px solid var(--cmt-border);border-radius:var(--radius);padding:1.1rem 1.25rem;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.cliente-mini::after{content:'Ver pedido →';position:absolute;bottom:1rem;right:1.1rem;font-size:11px;font-weight:700;color:var(--cmt-orange);opacity:0;transition:opacity 0.15s;}
.cliente-mini:hover{border-color:var(--cmt-orange);box-shadow:0 4px 16px rgba(232,93,4,0.1);transform:translateY(-1px);}
.cliente-mini:hover::after{opacity:1;}
.cm-avatar{width:40px;height:40px;border-radius:50%;background:var(--cmt-navy);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:#fff;margin-bottom:10px;flex-shrink:0;}
.cm-nome{font-size:14px;font-weight:700;color:var(--cmt-dark);}
.cm-pedido{font-size:12px;color:var(--cmt-gray);margin-top:2px;}
.cm-desc{font-size:12px;color:var(--cmt-gray2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cm-badge{margin-top:8px;}
.cm-progress-bar{height:4px;background:var(--cmt-border);border-radius:20px;margin-top:8px;overflow:hidden;}
.cm-progress-fill{height:100%;background:var(--cmt-orange);border-radius:20px;}

/* CARDS ADMIN */
.pedidos-lista{display:flex;flex-direction:column;gap:16px}
/* CARD COLLAPSE */
.pc-header-collapse{padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background 0.15s;}
.pc-header-collapse:hover{background:#faf9f6;}
.pc-header-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1;}
.pc-collapse-id{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--cmt-orange);white-space:nowrap;flex-shrink:0;}

// ── Firestore REST helpers ──
// Converte objeto JS → formato Firestore
function toFS(val){
  if(val===null||val===undefined) return {nullValue:null};
  if(typeof val==='boolean') return {booleanValue:val};
  if(typeof val==='number') return {integerValue:String(val)};
  if(typeof val==='string') return {stringValue:val};
  if(Array.isArray(val)) return {arrayValue:{values:val.map(toFS)}};
  if(typeof val==='object'){
    const fields={};
    for(const k in val) fields[k]=toFS(val[k]);
    return {mapValue:{fields}};
  }
  return {stringValue:String(val)};
}

// Converte formato Firestore → objeto JS
function fromFS(v){
  if(!v) return null;
  if('nullValue' in v) return null;
  if('booleanValue' in v) return v.booleanValue;
  if('integerValue' in v) return Number(v.integerValue);
  if('doubleValue' in v) return v.doubleValue;
  if('stringValue' in v) return v.stringValue;
  if('arrayValue' in v) return (v.arrayValue.values||[]).map(fromFS);
  if('mapValue' in v){
    const o={};
    for(const k in (v.mapValue.fields||{})) o[k]=fromFS(v.mapValue.fields[k]);
    return o;
  }
  return null;
}

async function fsGet(col, doc){
  const r = await fetch(`${FB_URL}/${col}/${doc}?key=${FB_API_KEY}`);
  if(!r.ok) return null;
  const d = await r.json();
  if(!d.fields) return null;
  const o={};
  for(const k in d.fields) o[k]=fromFS(d.fields[k]);
  return o;
}

async function fsPatch(col, doc, obj){
  const fields={};
  for(const k in obj) fields[k]=toFS(obj[k]);
  const r = await fetch(`${FB_URL}/${col}/${doc}?key=${FB_API_KEY}`, {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({fields})
  });
  return r.ok;
}

async function syncCarregar(msg){
  S.sincronizando=true; renderLoading(msg||'Carregando...');
  try {
    const doc = await fsGet('cmt','dados');
    if(doc){
      S.pedidos = doc.pedidos || [];
      if(doc.link) S.linkSite = doc.link;
      cacheSave(S.pedidos);
    } else {
      // primeira vez — cria documento vazio
      await fsPatch('cmt','dados',{pedidos:[], link:''});
      S.pedidos = [];
    }
    S.erroSync = null;
  } catch(e){
    S.erroSync = 'Sem conexão — usando dados locais.';
    S.pedidos = cacheLoad();
  }
  S.sincronizando=false;
}

async function syncSalvar(){
  cacheSave(S.pedidos);
  try {
    await fsPatch('cmt','dados',{pedidos:S.pedidos, link:S.linkSite});
    S.erroSync = null;
  } catch(e){
    S.erroSync = 'Aviso: não foi possível salvar na nuvem agora.';
  }
  render();
}

/* ─── EVENTOS ─── */
function bindEvents(){
  const $=id=>document.getElementById(id);

  // LOGIN
  const btnEntrar=$('btn-entrar');
  if(btnEntrar){
    const doLogin=async ()=>{
      const u=($('l-user').value||'').trim(),s=($('l-pass').value||'').trim();
      if(!u||!s) return;

      if(u===CFG.admin&&s===CFG.senha){
        S.tela='painel';S.role='admin';
        renderLoading('Carregando painel...');
        await syncCarregar('Carregando painel...');
        render();return;
      }

      // cliente: busca na nuvem com timeout de 5s
      renderLoading('Buscando seu pedido...');
      try {
        const timeout = new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),5000));
        await Promise.race([syncCarregar('Buscando seu pedido...'), timeout]);
      } catch(e){
        S.pedidos = cacheLoad(); // fallback para cache local
      }

      const ped=S.pedidos.find(p=>p.login===u&&p.senha===s);
      if(ped){S.tela='painel';S.role='cliente';S.userAtual=u;render();return;}

      // não achou — mostra erro
      render();
      setTimeout(()=>{
        const el=document.getElementById('login-erro');
        if(el) el.classList.remove('hidden');
      },50);
    };
    btnEntrar.addEventListener('click',doLogin);
    $('l-user').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
    $('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
  }

  // SAIR
  const btnSair=$('btn-sair');
  if(btnSair) btnSair.addEventListener('click',()=>{S.tela='login';S.role=null;S.userAtual=null;render();});

  // SALVAR LINK
  const btnLink=$('btn-link-salvar');
  if(btnLink) btnLink.addEventListener('click',()=>{
    const v=($('link-input').value||'').trim();
    S.linkSite=v; saveLink(v); syncSalvar();
    btnLink.textContent='✓ Salvo!';
    setTimeout(()=>btnLink.textContent='Salvar link',1500);
  });

  // TABS
  document.querySelectorAll('.tab-btn[data-aba]').forEach(b=>b.addEventListener('click',()=>{S.aba=b.dataset.aba;render()}));

  // CLIQUE NO CLIENTE → vai para pedido
  document.querySelectorAll('.cliente-mini[data-ir-pedido]').forEach(card=>{
    card.addEventListener('click',()=>{
      S.aba='pedidos'; S.cardAberto=card.dataset.irPedido;
      render();
      setTimeout(()=>{
        const target=document.querySelector(`[data-toggle="${card.dataset.irPedido}"]`);
        if(target) target.scrollIntoView({behavior:'smooth',block:'start'});
      },100);
    });
  });

  // SALVAR PEDIDO
  const btnSalvar=$('btn-salvar');
  if(btnSalvar) btnSalvar.addEventListener('click',()=>{
    const id=($('nf-id').value||'').trim(),cliente=($('nf-cliente').value||'').trim();
    const desc=($('nf-desc').value||'').trim(),login=($('nf-login').value||'').trim();
    const senha=($('nf-senha').value||'').trim(),tel=($('nf-tel').value||'').replace(/\D/g,'');
    if(!id||!cliente||!login||!senha){alert('Preencha: Nº do Pedido, Cliente, Login e Senha.');return}
    if(S.pedidos.find(p=>p.id===id)){alert(`Pedido "${id}" já existe.`);return}
    if(S.pedidos.find(p=>p.login===login)){alert(`Login "${login}" já está em uso.`);return}
    const novo={id,cliente,descricao:desc,login,senha,tel,etapa:0,fotos:{},timestamps:[agora(),null,null,null,null,null,null]};
    S.pedidos.push(novo);savePedidos(S.pedidos);S.aba='pedidos';S.modal=novo;render();
  });

  const btnCancelar=$('btn-cancelar');
  if(btnCancelar) btnCancelar.addEventListener('click',()=>{S.aba='pedidos';render()});

  // AVANÇAR
  document.querySelectorAll('.btn-avancar[data-id]').forEach(b=>b.addEventListener('click',()=>{
    const p=S.pedidos.find(x=>x.id===b.dataset.id);
    if(p&&p.etapa<6){
      p.etapa++;
      p.timestamps[p.etapa]=agora();
      savePedidos(S.pedidos);
      // se finalizou, abre WhatsApp de agradecimento automaticamente
      if(p.etapa===6){
        const tel=(p.tel||'').replace(/\D/g,'');
        const msg=encodeURIComponent(msgFinalizacao(p));
        const url=tel?`https://wa.me/55${tel}?text=${msg}`:`https://wa.me/?text=${msg}`;
        setTimeout(()=>window.open(url,'_blank'),400);
      }
      render();
    }
  }));

  // REGREDIR
  document.querySelectorAll('.btn-regredir[data-regredir]').forEach(b=>b.addEventListener('click',()=>{
    const p=S.pedidos.find(x=>x.id===b.dataset.regredir);
    if(p&&p.etapa>0){
      if(!confirm(`Regredir "${p.id}" para "${ETAPAS[p.etapa-1]}"?`))return;
      p.timestamps[p.etapa]=null;p.etapa--;savePedidos(S.pedidos);render();
    }
  }));

  // EXCLUIR
  document.querySelectorAll('.btn-excluir[data-id]').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm(`Excluir pedido ${b.dataset.id}?`))return;
    S.pedidos=S.pedidos.filter(p=>p.id!==b.dataset.id);savePedidos(S.pedidos);render();
  }));

  // WHATSAPP
  document.querySelectorAll('.btn-wpp[data-wpp]').forEach(b=>b.addEventListener('click',()=>{
    const p=S.pedidos.find(x=>x.id===b.dataset.wpp);if(p)abrirWhatsApp(p);
  }));

  // EDITAR — abrir modal
  document.querySelectorAll('.btn-editar[data-editar]').forEach(b=>b.addEventListener('click',()=>{
    const p=S.pedidos.find(x=>x.id===b.dataset.editar);
    if(p){S.modalEditar=p;render();}
  }));

  // EDITAR — salvar
  const btnEditSalvar=$('btn-edit-salvar');
  if(btnEditSalvar) btnEditSalvar.addEventListener('click',()=>{
    const p=S.pedidos.find(x=>x.id===btnEditSalvar.dataset.editId);
    if(!p)return;
    const novoLogin=($('ef-login').value||'').trim();
    // verifica se login já existe em outro pedido
    if(novoLogin!==p.login && S.pedidos.find(x=>x.login===novoLogin)){
      alert(`Login "${novoLogin}" já está em uso por outro cliente.`);return;
    }
    p.cliente = ($('ef-cliente').value||'').trim()||p.cliente;
    p.tel     = ($('ef-tel').value||'').replace(/\D/g,'');
    p.descricao = ($('ef-desc').value||'').trim();
    p.endereco  = ($('ef-endereco').value||'').trim();
    p.login   = novoLogin||p.login;
    p.senha   = ($('ef-senha').value||'').trim()||p.senha;
    savePedidos(S.pedidos);
    S.modalEditar=null;
    render();
  });

  // EDITAR — fechar
  const btnEditFechar=$('btn-edit-fechar');
  if(btnEditFechar) btnEditFechar.addEventListener('click',()=>{S.modalEditar=null;render();});
  const btnEditCancelar=$('btn-edit-cancelar');
  if(btnEditCancelar) btnEditCancelar.addEventListener('click',()=>{S.modalEditar=null;render();});
  const editOverlay=$('modal-edit-overlay');
  if(editOverlay) editOverlay.addEventListener('click',e=>{if(e.target===editOverlay){S.modalEditar=null;render();}});

  // TOGGLE CARD
  document.querySelectorAll('.pc-header-collapse[data-toggle]').forEach(b=>b.addEventListener('click',e=>{
    // não fechar se clicou em botão interno
    if(e.target.closest('button')) return;
    const id=b.dataset.toggle;
    S.cardAberto = S.cardAberto===id ? null : id;
    render();
  }));

  // FOTO — abrir seletor
  document.querySelectorAll('.btn-foto-upload[data-foto-upload]').forEach(b=>b.addEventListener('click',()=>{
    document.getElementById('foto-'+b.dataset.fotoUpload)?.click();
  }));
  // FOTO — processar upload
  document.querySelectorAll('.foto-input-hidden').forEach(input=>input.addEventListener('change',()=>{
    const pid=input.id.replace('foto-','');
    const file=input.files[0];
    if(!file)return;
    if(file.size>2*1024*1024){alert('Imagem muito grande! Use uma foto menor que 2MB.');return;}
    const reader=new FileReader();
    reader.onload=e=>{
      const p=S.pedidos.find(x=>x.id===pid);
      if(p){p.foto=e.target.result;savePedidos(S.pedidos);render();}
    };
    reader.readAsDataURL(file);
  }));
  // FOTO — remover
  document.querySelectorAll('.btn-foto-remover[data-foto-remover]').forEach(b=>b.addEventListener('click',()=>{
    const p=S.pedidos.find(x=>x.id===b.dataset.fotoRemover);
    if(p&&confirm('Remover a foto?')){p.foto=null;savePedidos(S.pedidos);render();}
  }));
  // FOTO — zoom
  document.querySelectorAll('[data-zoom]').forEach(el=>el.addEventListener('click',()=>{
    S.fotoZoom=el.dataset.zoom;render();
  }));
  const fotoZoomOverlay=document.getElementById('foto-zoom-overlay');
  if(fotoZoomOverlay) fotoZoomOverlay.addEventListener('click',()=>{S.fotoZoom=null;render();});

  // PÓS-VENDA — abrir
  document.querySelectorAll('.btn-posv[data-posv]').forEach(b=>b.addEventListener('click',()=>{
    const p=S.pedidos.find(x=>x.id===b.dataset.posv);
    if(p){S.posVenda=p;render();}
  }));
  // PÓS-VENDA — fechar
  const pvClose=document.getElementById('pv-close');
  if(pvClose) pvClose.addEventListener('click',()=>{S.posVenda=null;render();});
  const pvOverlay=document.getElementById('pv-overlay');
  if(pvOverlay) pvOverlay.addEventListener('click',e=>{if(e.target===pvOverlay){S.posVenda=null;render();}});
  // PÓS-VENDA — enviar mensagem
  const btnPvEnviar=document.getElementById('btn-pv-enviar');
  if(btnPvEnviar) btnPvEnviar.addEventListener('click',()=>{
    const texto=(document.getElementById('pv-texto').value||'').trim();
    if(!texto)return;
    const p=S.posVenda;
    if(!p)return;
    if(!p.posVenda)p.posVenda=[];
    p.posVenda.push({texto,data:agora()});
    savePedidos(S.pedidos);
    // enviar WhatsApp se marcado
    if(document.getElementById('pv-send-wpp')?.checked){
      const tel=(p.tel||'').replace(/\D/g,'');
      const msg=encodeURIComponent(`🔧 *Pós-Venda — ${p.id}*\nOlá, *${p.cliente}*!\n\n${texto}\n\n*CMT Projetos e Fachadas*`);
      const url=tel?`https://wa.me/55${tel}?text=${msg}`:`https://wa.me/?text=${msg}`;
      window.open(url,'_blank');
    }
    render();
    // re-scroll para o fim das mensagens
    setTimeout(()=>{const lista=document.getElementById('pv-msgs-lista');if(lista)lista.scrollTop=lista.scrollHeight;},100);
  });
  // PÓS-VENDA — excluir mensagem
  document.querySelectorAll('.pv-msg-del[data-pv-del]').forEach(b=>b.addEventListener('click',()=>{
    const idx=parseInt(b.dataset.pvDel);
    const p=S.posVenda;
    if(p&&p.posVenda&&confirm('Excluir esta mensagem?')){
      p.posVenda.splice(idx,1);
      savePedidos(S.pedidos);
      render();
    }
  }));

  // VER FINALIZADOS — card stat clicável
  const btnVerFin=document.getElementById('btn-ver-finalizados');
  if(btnVerFin) btnVerFin.addEventListener('click',()=>{S.aba='finalizados';render();});

  // GERAR PDF
  document.querySelectorAll('.btn-pdf[data-pdf]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const p=S.pedidos.find(x=>x.id===b.dataset.pdf);
    if(p){S.modalPdf=p;render();}
  }));

  // PDF — imprimir
  const btnImprimir=document.getElementById('btn-pdf-imprimir');
  if(btnImprimir) btnImprimir.addEventListener('click',()=>{
    const area=document.getElementById('pdf-print-area');
    const w=window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head>
      <meta charset="UTF-8"/>
      <title>Relatório ${S.modalPdf?.id||''} - CMT</title>
      <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
      <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Barlow',sans-serif;color:#0d1117;padding:2rem;font-size:13px;}
        .pdf-topo{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:2px solid #131b2e;}
        .pdf-logo{display:flex;align-items:center;gap:10px;}
        .pdf-logo-box{width:42px;height:42px;background:#e85d04;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:#fff;}
        .pdf-empresa{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#131b2e;}
        .pdf-subtitulo{font-size:11px;color:#6b7280;}
        .pdf-num{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:#e85d04;}
        .pdf-secao{margin-bottom:1.25rem;}
        .pdf-secao-titulo{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #e5e7eb;}
        .pdf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
        .pdf-campo{font-size:13px;color:#0d1117;padding:6px 0;}
        .pdf-campo span{display:block;font-size:11px;color:#9ca3af;margin-bottom:2px;}
        .pdf-campo strong{font-weight:600;}
        .pdf-etapas{display:flex;flex-direction:column;gap:6px;}
        .pdf-etapa{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:6px;background:#f8f7f4;}
        .pdf-etapa.ok{background:#d1fae5;color:#065f46;}
        .pdf-etapa-num{width:20px;height:20px;border-radius:50%;background:#e85d04;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .pdf-etapa.ok .pdf-etapa-num{background:#059669;}
        .pdf-etapa-nome{flex:1;font-weight:500;}
        .pdf-etapa-ts{font-size:11px;color:#6b7280;margin-left:auto;}
        .pdf-rodape{margin-top:1.5rem;padding-top:1rem;border-top:1px solid #e5e7eb;font-size:11px;color:#9ca3af;text-align:center;}
        @media print{body{padding:1rem}}
      </style></head><body>${area.innerHTML}</body></html>`);
    w.document.close();
    setTimeout(()=>w.print(),500);
  });

  // PDF — fechar
  const btnPdfFechar=document.getElementById('btn-pdf-fechar');
  if(btnPdfFechar) btnPdfFechar.addEventListener('click',()=>{S.modalPdf=null;render();});
  const pdfOverlay=document.getElementById('modal-pdf-overlay');
  if(pdfOverlay) pdfOverlay.addEventListener('click',e=>{if(e.target===pdfOverlay){S.modalPdf=null;render();}});

  // OBS SALVAR (acumula)
  document.querySelectorAll('.btn-obs-salvar[data-salvar-obs]').forEach(b=>b.addEventListener('click',()=>{
    const p=S.pedidos.find(x=>x.id===b.dataset.salvarObs);
    const ta=document.getElementById('obs-'+b.dataset.salvarObs);
    if(!p||!ta)return;
    const texto=ta.value.trim();
    if(!texto)return;
    if(!p.obsList)p.obsList=[];
    p.obsList.push({texto,data:agora()});
    savePedidos(S.pedidos);
    b.textContent='✓ Adicionado!';
    setTimeout(()=>{b.textContent='+ Adicionar';render();},800);
  }));

  // OBS LIMPAR (por índice)
  document.querySelectorAll('.btn-obs-limpar[data-limpar-idx]').forEach(b=>b.addEventListener('click',()=>{
    const p=S.pedidos.find(x=>x.id===b.dataset.limparId);
    const idx=parseInt(b.dataset.limparIdx);
    if(p&&p.obsList&&confirm('Remover este aviso?')){
      p.obsList.splice(idx,1);
      savePedidos(S.pedidos);render();
    }
  }));

  // PREVISÃO — salvar
  document.querySelectorAll('.btn-prev-salvar[data-prev-salvar]').forEach(b=>b.addEventListener('click',()=>{
    const p=S.pedidos.find(x=>x.id===b.dataset.prevSalvar);
    const input=document.getElementById('prev-'+b.dataset.prevSalvar);
    if(!p||!input)return;
    p.previsao=input.value.trim();
    savePedidos(S.pedidos);
    b.textContent='✓ Salvo!';
    setTimeout(()=>{b.textContent='Salvar';render();},800);
  }));

  // PREVISÃO — remover
  document.querySelectorAll('.btn-prev-remover[data-prev-remover]').forEach(b=>b.addEventListener('click',()=>{
    const p=S.pedidos.find(x=>x.id===b.dataset.prevRemover);
    if(p){p.previsao=null;savePedidos(S.pedidos);render();}
  }));

  // MODAL
  const btnModalWpp=$('btn-modal-wpp');
  if(btnModalWpp) btnModalWpp.addEventListener('click',()=>{if(S.modal)abrirWhatsApp(S.modal);S.modal=null;render();});
  const btnModalFechar=$('btn-modal-fechar');
  if(btnModalFechar) btnModalFechar.addEventListener('click',()=>{S.modal=null;render();});
  const overlay=$('modal-overlay');
  if(overlay) overlay.addEventListener('click',e=>{if(e.target===overlay){S.modal=null;render();}});

  // COPIAR
  document.querySelectorAll('.btn-copiar[data-cred]').forEach(b=>b.addEventListener('click',()=>{
    navigator.clipboard.writeText(decodeURIComponent(b.dataset.cred)).then(()=>{
      b.textContent='✓ Copiado!';setTimeout(()=>b.textContent='📋 Copiar acesso',2000);
    });
  }));
}

render();
</script>
</body>
</html>
